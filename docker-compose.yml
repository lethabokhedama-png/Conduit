services:
  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    env_file: ./gateway/.env.example
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  engine:
    build: ./engine
    env_file: ./engine/.env.example
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
      POSTGRES_DB: conduit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
