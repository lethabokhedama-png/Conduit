<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Three input lines converging to gate -->
  <line x1="4" y1="18" x2="36" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="30" x2="36" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="42" x2="36" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Gate bar -->
  <line x1="36" y1="14" x2="36" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Output line -->
  <line x1="36" y1="30" x2="60" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="72" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" letter-spacing="0.5" fill="white">Conduit</text>
</svg>
