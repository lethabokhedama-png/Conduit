<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three input lines converging to gate -->
  <line x1="4" y1="13" x2="26" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="24" x2="26" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="35" x2="26" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gate bar -->
  <line x1="26" y1="8" x2="26" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Output line -->
  <line x1="26" y1="24" x2="44" y2="24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
